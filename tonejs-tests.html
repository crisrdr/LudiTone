<html>
<head></head>
<body>
    <button id="play-btn">Play</button>
    <div id="blocklyDiv" style="height: 480px; width: 600px;"></div>

    <!-- Load Blockly core -->
    <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/en.js"></script>
<!-- Load the tone.js library -->
<script src="http://unpkg.com/tone"></script>
<!-- Load the proper app 
<script src="app.js"></script> -->
<h1>Tone.js Loop</h1>
<p>click to play</p>
<script>

(function() {
const texto = "const now = Tone.now();const synth0 = new Tone.Synth().toDestination();synth0.set({oscillator: {type: 'sine'}});synth0.triggerAttackRelease('c4', 1, now + 0);const synth1 = new Tone.Synth().toDestination();synth1.set({oscillator: {type: 'sine'}});synth1.triggerAttackRelease('d4', 1, now + 0.5);";
const listado = texto.split(";");
const synths = listado.filter((linea) => linea.search("triggerAttackRelease") > -1);
const rest = listado.filter((linea) => linea.search("triggerAttackRelease") == -1);
const triggers = synths.map((linea) => linea.split("now + ")[0]);
const nows = synths.map((linea) => linea.split("now + ")[1]);
const triggers2 = triggers.map((linea) => linea.substring(0, linea.length - 2) + ");");
const scheduling = nows.map((linea) => linea.substring(0, linea.length - 1));

  var codigo = '';
  rest.forEach((e, i) => {
    console.log(i);
	codigo = codigo + e + ';';
  });

  triggers2.forEach((e, i) => {
    const num = scheduling[i];
	codigo = codigo + 'var loop' + i + ' = new Tone.Loop(function(time){' + triggers2[i] + '}, "2n").start(' + num + '); loop'+i+'.iterations = 4;'
  });


/*
var loop0 = new Tone.Loop(function(time){

	console.log(time);
}, "2n").start(now + 0);
loop0.iterations = 4;

var loop1 = new Tone.Loop(function(time){
	
	console.log(time);
}, "2n").start(now + 0.5);
loop1.iterations = 4;
*/



  /**
   * Play Controls
   */
  let playing = false;

  document.querySelector("body").addEventListener("click", function() {
    if (!playing) {
      Tone.Transport.start();
      playing = true;
    } else {
      Tone.Transport.stop();
    }
  });
})()
</script>
</body>
</html>
