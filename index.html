<!DOCTYPE html>
<html>

<head>
    <title>LudiTone</title>
    <link rel="icon" href="styles/id.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/3.20200924.4/blockly_compressed.min.js"
        integrity="sha512-QXLWks3csNuoy9T6AoZm8BewWPHVGUsz0HcWpTF6xH8Vv55GxI4h4h0+ghQHfdmv7nnm9GV4I5Y1kKOWWStf6g=="
        crossorigin="anonymous"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/3.20200924.4/blocks_compressed.min.js"
        integrity="sha512-6cPR7gw4XO/tr9eRpd2w7SJjBNMtMWa2SQbwhHNPKJb/ZJQR1WsSq+8EEMzt32Qpz46uc3DjHeRUwkAZqRlm3g=="
        crossorigin="anonymous"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/3.20200924.4/javascript_compressed.min.js"
        integrity="sha512-EmvUjPJJkHoyFrSrvifuA/LcKMrtTIP5PV996fl1pWicyhqJeAbnSMzh9pM+VX7L/QZHdTozI9BA2e5g/8hB9Q=="
        crossorigin="anonymous"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/3.20200924.4/msg/es.min.js"
        crossorigin="anonymous"></script>
    <script src="https://unpkg.com/tone"></script>
    <script defer src="blocks/loop.js"></script>
    <script defer src="blocks/opt_blocks_mt.js"></script>
    <script defer src="blocks/opt_blocks_st.js"></script>
    <script defer src="blocks/repeat.js"></script>
    <script defer src="blocks/wait.js?v=2"></script>

    <script defer src="blocks/sounds/statement/chord_st_ed.js"></script>
    <script defer src="blocks/sounds/statement/chord_st_oc.js"></script>
    <script defer src="blocks/sounds/statement/chord_st.js"></script>
    <script defer src="blocks/sounds/statement/note_st_oc.js"></script>
    <script defer src="blocks/sounds/statement/note_st.js"></script>
    <script defer src="blocks/sounds/statement/semitone_st_oc.js"></script>
    <script defer src="blocks/sounds/statement/semitone_st.js"></script>

    <script defer src="blocks/sounds/mutator/chord_mt_ed.js"></script>
    <script defer src="blocks/sounds/mutator/chord_mt_oc.js"></script>
    <script defer src="blocks/sounds/mutator/chord_mt.js"></script>
    <script defer src="blocks/sounds/mutator/note_mt.js"></script>
    <script defer src="blocks/sounds/mutator/note_mt_oc.js"></script>
    <script defer src="blocks/sounds/mutator/semitone_mt_oc.js"></script>
    <script defer src="blocks/sounds/mutator/semitone_mt.js"></script>

    <script defer src="blocks/effects/autofilter.js"></script>
    <script defer src="blocks/effects/autopanner.js"></script>
    <script defer src="blocks/effects/autowah.js"></script>
    <script defer src="blocks/effects/bitcrusher.js"></script>
    <script defer src="blocks/effects/chebyshev.js"></script>
    <script defer src="blocks/effects/chorus.js"></script>
    <script defer src="blocks/effects/delay.js"></script>
    <script defer src="blocks/effects/distortion.js"></script>
    <script defer src="blocks/effects/freeverb.js"></script>
    <script defer src="blocks/effects/highpassfilter.js"></script>
    <script defer src="blocks/effects/jcreverb.js"></script>
    <script defer src="blocks/effects/lowpassfilter.js"></script>
    <script defer src="blocks/effects/midsideeffect.js"></script>
    <script defer src="blocks/effects/phaser.js"></script>
    <script defer src="blocks/effects/pingpongdelay.js"></script>
    <script defer src="blocks/effects/pitchshift.js"></script>
    <script defer src="blocks/effects/reverb.js"></script>
    <script defer src="blocks/effects/stereowidener.js"></script>
    <script defer src="blocks/effects/tremolo.js"></script>
    <script defer src="blocks/effects/vibrato.js"></script>
    <script defer src="app.js"></script>
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/controls.css">
    <link rel="stylesheet" href="styles/menu.css">
    <link rel="stylesheet" href="styles/modal.css">
    <link rel="stylesheet" href="styles/toolbox.css">
</head>

<body>
    <div class="controls">
        <button id="play-btn">Play</button>
        <button id="stop-btn">Stop</button>
        <button id="live-btn" style="display: none;">Modo Live: OFF</button>
        <button id="create-block-btn" style="display: none;">Crear Bloque</button>
        <button id="clear-btn">Limpiar Área</button>
        <button id="feedback-btn">Comentarios</button>
        <button id="btn-menu">Volver al Menú</button>
    </div>

    <!-- Modal para crear bloque personalizado -->
    <div id="custom-block-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2 id="modal-title">Crear Nuevo Bloque</h2>

            <div class="input-group">
                <label for="block-name-input">Nombre del bloque:</label>
                <input type="text" id="block-name-input" placeholder="Ej: Mi Acorde">
            </div>

            <div class="input-group">
                <label for="block-color-input">Color del bloque:</label>
                <div class="color-picker-wrapper">
                    <input type="color" id="block-color-input" value="#8b5cf6">
                    <span id="color-hex-display">#8b5cf6</span>
                </div>
            </div>

            <div class="input-group">
                <label>Selecciona los niveles donde quieres que aparezca el bloque:</label>
                <div class="level-selector">
                    <label class="level-chip">
                        <input type="checkbox" class="level-checkbox" value="intermediate">
                        <span>Intermedio</span>
                    </label>
                    <label class="level-chip">
                        <input type="checkbox" class="level-checkbox" value="advanced">
                        <span>Avanzado</span>
                    </label>
                </div>
            </div>

            <div class="modal-actions">
                <button id="cancel-block-btn" class="btn-secondary">Cancelar</button>
                <button id="save-block-btn" class="btn-primary">Guardar Bloque</button>
            </div>
        </div>
    </div>

    <!-- Toast de aviso: bloques no permitidos -->
    <div id="block-warning-toast"></div>

    <div id="blocklyDiv" style="height: calc(100vh - 50px); width: 100vw; position: absolute; left: 0;"></div>

    <div id="startup-menu">
        <h1>LudiTone</h1>
        <div class="cards-container">
            <div class="mode-card" id="btn-basic">
                <h2>Básico</h2>
            </div>
            <div class="mode-card" id="btn-intermediate">
                <h2>Intermedio</h2>
            </div>
            <div class="mode-card" id="btn-advanced">
                <h2>Avanzado</h2>
            </div>
            <div class="mode-card" id="btn-free">
                <h2>Live</h2>
                <p>Edición en tiempo real. Todas las herramientas disponibles.</p>
            </div>
            <div class="mode-card mode-card--sound" id="btn-sound">
                <div class="sound-card-icon">🎶</div>
                <h2>Crear Sonido</h2>
                <p>Diseña tu propio sonido con notas y sus opciones.</p>
            </div>
            <div class="home-feedback">
                <p>Deja tus comentarios para que podamos saber tu experiencia con la app :)</p>
                <button id="feedback-home-btn">Comentarios</button>
            </div>
        </div>
</body>

</html>
